[project]
name = "project-vela"
revision = "1.0"

# This profile is intentionally empty until a Vela runtime capability needs a
# credential. Add declarations here with the feature that consumes them; never
# add secret values or sensitive defaults to this file.
[profiles.default]

# Used only by tests/secretspec-integration.sh to prove that declaration,
# resolution, and command injection work without accessing a real credential.
[profiles.integration-test]
VELA_TEST_SECRET = { description = "Disposable SecretSpec integration fixture", required = true }
